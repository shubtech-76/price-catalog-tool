<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SR Solutions — Price Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f4f5f7}
.app{display:flex;flex-direction:column;min-height:600px;max-width:760px;margin:0 auto;background:#fff}
.tabs{display:flex;gap:0;border-bottom:1px solid #e5e7eb;margin-bottom:0}
.tab{padding:10px 22px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#6b7280;border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:#1b3d6e;border-bottom:2px solid #1b3d6e}
.panel{display:none;padding:1rem}
.panel.active{display:block}

/* Admin toolbar */
.admin-toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px}
.toolbar-btn{font-size:11px;color:#1b3d6e;background:#eef2f8;border:0.5px solid #c7d2e3;border-radius:6px;padding:4px 10px;cursor:pointer;font-weight:600}
.toolbar-btn:hover{background:#1b3d6e;color:#fff}

/* Collapsible section cards */
.section-block{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:10px;overflow:hidden;background:#fff;transition:box-shadow .15s}
.section-block:hover{box-shadow:0 1px 8px rgba(0,0,0,0.07)}
.section-title{font-size:13px;font-weight:600;color:#1b3d6e;margin:0;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;background:#fafbfc}
.section-title:hover{background:#f1f3f6}
.section-title-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden}
.section-chevron{font-size:10px;color:#9ca3af;flex-shrink:0;width:10px}
.section-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section-count{font-size:11px;color:#6b7280;font-weight:600;background:#eef0f3;padding:1px 7px;border-radius:10px;flex-shrink:0}
.section-type-badge{font-size:9px;font-weight:700;color:#1b3d6e;background:#dbe4f3;padding:2px 6px;border-radius:4px;letter-spacing:0.03em;flex-shrink:0}
.section-body{padding:6px 12px 10px}
.section-block[data-collapsed="true"] .section-body{display:none}

.price-row{display:grid;grid-template-columns:1fr 130px 28px;gap:8px;align-items:center;padding:5px 0;border-bottom:0.5px solid #e5e7eb}
.price-row:last-child{border-bottom:none}
.price-label{font-size:13px;color:#1a1a2e}
.price-label small{display:block;font-size:11px;color:#6b7280}
.price-input{display:flex;align-items:center;gap:4px}
.price-input span{font-size:13px;color:#6b7280}
.price-input input{width:85px;padding:4px 8px;font-size:13px;border:0.5px solid #d1d5db;border-radius:6px;background:#fff;color:#1a1a2e;text-align:right}
.price-input input:focus{outline:none;border-color:#1b3d6e;box-shadow:0 0 0 2px rgba(27,61,110,0.12)}
.icon-btn{width:26px;height:26px;border:none;background:transparent;color:#9ca3af;font-size:13px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.icon-btn:hover{background:#fee2e2;color:#dc2626}
.del-sec-btn{font-size:13px;background:transparent;border:none;cursor:pointer;color:#9ca3af;padding:2px 6px;border-radius:6px;transition:all .15s;flex-shrink:0}
.del-sec-btn:hover{background:#fee2e2;color:#dc2626}
.add-item-row{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0 4px;align-items:center}
.add-item-row .ai-label{flex:1 1 110px;min-width:0;padding:5px 8px;font-size:13px;border:0.5px dashed #d1d5db;border-radius:6px;background:#fafafa;color:#1a1a2e}
.add-item-row .ai-price{flex:0 1 70px;min-width:50px;padding:5px 8px;font-size:13px;border:0.5px dashed #d1d5db;border-radius:6px;background:#fafafa;color:#1a1a2e;text-align:right}
.add-item-row .btn-add{flex-shrink:0}
.add-item-row input:focus{outline:none;border-color:#1b3d6e;border-style:solid;background:#fff}
.btn-add{padding:5px 10px;background:#eef2f8;color:#1b3d6e;border:0.5px solid #c7d2e3;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-add:hover{background:#1b3d6e;color:#fff}

/* Add department wizard */
.add-dept-block{margin-top:1.2rem;border:1.5px dashed #c7d2e3;border-radius:10px;overflow:hidden}
.dept-type-toggle{display:flex;gap:6px;margin-bottom:8px}
.type-btn{flex:1;padding:7px;font-size:12px;font-weight:600;border:1.5px solid #d1d5db;border-radius:6px;background:#fafafa;color:#6b7280;cursor:pointer}
.type-btn.active{border-color:#1b3d6e;background:#eef2f8;color:#1b3d6e}
.type-btn:hover{border-color:#1b3d6e}

/* Word-style grid table picker */
.grid-picker-wrap{margin-top:6px}
.grid-picker{display:inline-grid;grid-template-columns:repeat(8,20px);grid-auto-rows:20px;gap:2px;background:#fff;padding:8px;border:1px solid #e5e7eb;border-radius:8px}
.grid-cell{width:20px;height:20px;border:1px solid #d1d5db;background:#fafafa;border-radius:2px;cursor:pointer}
.grid-cell.hl{background:#aebede;border-color:#1b3d6e}
.grid-picker-label{font-size:12px;color:#1b3d6e;font-weight:600;margin-top:6px}

/* Custom multi-column table editor */
.custom-table-wrap{overflow-x:auto}
.custom-row{display:flex;gap:4px;align-items:center;padding:3px 0}
.custom-header-row{padding-bottom:6px;border-bottom:1px solid #e5e7eb;margin-bottom:4px}
.custom-cell-input{flex:1;min-width:80px;padding:5px 7px;font-size:12px;border:0.5px solid #d1d5db;border-radius:5px;background:#fff;color:#1a1a2e}
.custom-header-input{flex:1;min-width:80px;padding:5px 7px;font-size:12px;font-weight:700;border:0.5px solid #c7d2e3;border-radius:5px;background:#eef2f8;color:#1b3d6e}
.custom-cell-input:focus,.custom-header-input:focus{outline:none;border-color:#1b3d6e}
.custom-row-actions{display:flex;gap:3px;flex-shrink:0}

.dl-btn{width:100%;padding:10px;background:#1b3d6e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:1rem;display:flex;align-items:center;justify-content:center;gap:8px}
.dl-btn:hover{background:#163260}
.search-bar{width:100%;padding:7px 12px;font-size:13px;border:0.5px solid #d1d5db;border-radius:8px;background:#fff;color:#1a1a2e;margin-bottom:1rem}
.search-bar:focus{outline:none;border-color:#1b3d6e}

@media print{
  .tabs,.dl-btn,.search-bar{display:none!important}
  #preview-panel{display:block!important;padding:0}
  .pdf-page{box-shadow:none;margin:0;border-radius:0}
}

.pdf-page{background:#fff;color:#1a1a2e;font-family:Arial,sans-serif;padding:28px 28px 20px;max-width:680px;margin:0 auto;border:0.5px solid #e5e7eb;border-radius:8px}
.pdf-header-img{width:100%;display:block;border-radius:8px;margin-bottom:14px}
.pdf-title-bar{background:#1b3d6e;color:#fff;text-align:center;padding:7px;font-size:18px;font-weight:700;letter-spacing:0.06em;margin-bottom:10px;border-radius:4px}
.pdf-subtitle{text-align:center;font-size:11px;color:#555;margin-bottom:14px;letter-spacing:0.04em}
.pdf-section{margin-bottom:12px}
.pdf-section-title{background:#d0d8e8;color:#1b3d6e;font-size:14px;font-weight:700;padding:6px 8px;border-radius:3px;margin-bottom:6px;text-align:center;text-transform:uppercase;letter-spacing:0.04em}
.pdf-table{width:100%;border-collapse:collapse;font-size:11px}
.pdf-table th{background:#1b3d6e;color:#fff;padding:4px 7px;text-align:left;font-size:10px}
.pdf-table th:last-child{text-align:right}
.pdf-table td{padding:3px 7px;border-bottom:0.5px solid #dde3ee;vertical-align:top}
.pdf-table td:last-child{text-align:right}
.pdf-table tr:nth-child(even) td{background:#f5f7fb}
.pdf-table .price-cell{font-weight:600;color:#1b3d6e;text-align:right;white-space:nowrap}
.pdf-footer{text-align:center;font-size:9px;color:#999;margin-top:12px;padding-top:8px;border-top:0.5px solid #dde3ee}
.pdf-partner-img{width:100%;display:block;border-radius:6px;margin-top:10px}
</style>
</head>
<body>

<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('admin')">⚙ Admin</button>
    <button class="tab" onclick="switchTab('preview')">👁 Preview / Download</button>
  </div>

  <div id="admin-panel" class="panel active">
    <input class="search-bar" type="text" placeholder="🔍 Search product..." oninput="filterRows(this.value)" />
    <div id="admin-form"></div>
    <button class="dl-btn" onclick="switchTab('preview')">👁 Preview Rate List</button>
  </div>

  <div id="preview-panel" class="panel">
    <div id="pdf-output" class="pdf-page"></div>
    <button class="dl-btn" onclick="downloadPDF()">⬇ Download PDF</button>
  </div>
</div>

<script>
// Section order mirrors the source PDF's page sequence so Preview/PDF output
// matches the printed rate list 1:1. Every section is either:
//   {type:'simple', headers?, items:[{label, sub?, key, val}, ...]}   — Item + Price table
//   {type:'custom', columns:[...], rows:[{key, cells:[...]}]}         — free-form N-column table (Word-table style)
const data = {
  "ACDB DCDB – Single Phase": {type:'simple', headers:["Brand Combination","Set Price"], items:[
    {label:"Havells + Havells", key:"sp_hh", val:2350},
    {label:"Havells + Sighter", key:"sp_hs", val:2100},
    {label:"Havells + INFI (Opnable Box)", key:"sp_hi", val:1550},

  "ACDB DCDB – Three Phase": {type:'simple', headers:["Brand Combination","Set Price"], items:[
    {label:"Havells + Havells", key:"tp_hh", val:4300},
    {label:"Havells + Sighter", key:"tp_hs", val:2650},
    {label:"Havells + INFI (Opnable Box)", key:"tp_hi", val:3350},
  ]},
  "Earthing – Copper Bonded Rod (14mm)": {type:'simple', items:[
    {label:"1 Mtr Rod 4G T Type", key:"cr1_14", val:155},
    {label:"2 Mtr Rod 4G", key:"cr2_14", val:300},
    {label:"Point Rod 1 Mtr (Round)", key:"crp_14", val:130},
  ]},
  "Earthing – Copper Bonded Rod (17mm)": {type:'simple', items:[
    {label:"1 Mtr Rod 4G T Type", key:"cr1_17", val:210},
    {label:"2 Mtr Rod 4G", key:"cr2_17", val:350},
  ]},
  "Lightning Arrester (LA)": {type:'simple', items:[
    {label:"1 Mtr with PVC Stand (14mm)", key:"la_pvc", val:240},
    {label:"1 Mtr with Welding (14mm)", key:"la_weld", val:350},
  ]},
  "Chemical Bag": {type:'simple', items:[
    {label:"15 KG Chemical Bag", key:"chem15", val:80},
    {label:"25 KG Chemical Bag", key:"chem25", val:120},
  ]},
  "Earthing Kit": {type:'simple', items:[
    {label:"1MTR x3 Rod, 1 LA, 15kg Chem", key:"kit1", val:790},
    {label:"2MTR x3 Rod, 1 LA, 25kg Chem", key:"kit2", val:1320},
    {label:"1MTR Point Rod x3, 1 LA, 15kg", key:"kit3", val:740},
  ]},
  "GI Earthing Electrode": {type:'simple', items:[
    {label:"58 Dia × 1 Meter", key:"gi1", val:240},
    {label:"58 Dia × 2 Meter", key:"gi2", val:450},
    {label:"58 Dia × 3 Meter", key:"gi3", val:950},
  ]},
  "GI Earthing Electrode (Copper Bonded)": {type:'simple', items:[
    {label:"58 Dia × 1 Meter", key:"gicb1", val:350},
    {label:"58 Dia × 2 Meter", key:"gicb2", val:750},
    {label:"58 Dia × 3 Meter", key:"gicb3", val:1050},
  ]},
  "Saddle – Cable Nail Clips": {type:'simple', items:[
    {label:"12 mm", key:"sad12", val:59},
    {label:"14 mm", key:"sad14", val:69},
    {label:"16 mm", key:"sad16", val:79},
    {label:"20 mm", key:"sad20", val:99},
    {label:"25 mm", key:"sad25", val:115},
  ]},
  "Cable Tie": {type:'simple', items:[
    {label:"150 mm", key:"ct150", val:58},
    {label:"200 mm", key:"ct200", val:68},
    {label:"250 mm", key:"ct250", val:68},
    {label:"300 mm", key:"ct300", val:88},
    {label:"350 mm", key:"ct350", val:99},
    {label:"400 mm", key:"ct400", val:110},
    {label:"SS Cable Tie 300 mm", key:"ctss", val:260},
  ]},
  "MC4 Connector": {type:'simple', items:[
    {label:"MC4 Connector (Male & Female)", key:"mc4", val:18},
    {label:"Branch Connector (2 in 1 Out)", key:"mc4b", val:150},
  ]},
  "Pit Cover": {type:'simple', items:[
    {label:"Pit Cover 6 Inch", key:"pit6", val:75},
  ]},
  "DC Wire – Polycab (per meter)": {type:'simple', items:[
    {label:"4 Sq mm", key:"dc4", val:55.50},
    {label:"6 Sq mm", key:"dc6", val:81},
  ]},
  "AC Wire – Copper Flex (per meter)": {type:'simple', items:[
    {label:"Polycab 2.5 SQ MM", key:"ac_p25", val:35.50},
    {label:"JMP 2.5 SQ MM", key:"ac_j25", val:30.50},
    {label:"Polycab 4 SQ MM", key:"ac_p4", val:50.25},
    {label:"JMP 4 SQ MM", key:"ac_j4", val:39.50},
    {label:"Polycab 6 SQ MM", key:"ac_p6", val:60.50},
    {label:"JMP 6 SQ MM", key:"ac_j6", val:76},
  ]},
  "Aluminium Earthing Wire (per meter)": {type:'simple', items:[
    {label:"1 Core 6mm", key:"alu6", val:11},
    {label:"1 Core 10mm", key:"alu10", val:16.50},
    {label:"1 Core 16mm", key:"alu16", val:21},
  ]},
  "Mid Clamp & End Clamp": {type:'simple', items:[
    {label:"Mid Clamp 25mm", key:"mc25", val:17.50},
    {label:"Mid Clamp 30mm", key:"mc30", val:20},
    {label:"End Clamp 30mm", key:"ec30", val:17.50},
    {label:"End Clamp 35mm", key:"ec35", val:18.75},
  ]},
  "Spring Nut & Allen Bolt": {type:'simple', items:[
    {label:"Spring Nut M8", key:"sn_m8", val:7},
    {label:"Allen Bolt 8mm", key:"ab_8", val:7},
  ]},
  "PVC Channel – Cable Tray": {type:'simple', items:[
    {label:"45x45", key:"pvc4545", val:88},
    {label:"45x25", key:"pvc4525", val:68},
  ]},
  "J Hook (per KG)": {type:'simple', items:[
    {label:"40x40 / 40x60", key:"jhook", val:110},
  ]},
  "Wedge Anchor Fastener": {type:'simple', items:[
    {label:"M10 x 100 (White)", key:"waf_m10_100", val:11},
    {label:"M12 x 100 (White)", key:"waf_m12_100", val:14},
    {label:"M10 x 125 (White)", key:"waf_m10_125", val:14},
    {label:"M12 x 125 (White)", key:"waf_m12_125", val:14},
  ]},
  "M10 & M12 Fastener": {type:'simple', items:[
    {label:"Fastener M10", key:"fast_m10", val:10.50},
    {label:"Fastener M12", key:"fast_m12", val:19},
  ]},
  "Others": {type:'simple', items:[
    {label:"Lock Fix", key:"lockfix", val:350},
    {label:"Zinc Spray", key:"zinc", val:160},
  ]},
  "Flexible Pipe Heavy (per meter)": {type:'simple', items:[
    {label:"14mm (100mtr roll)", key:"fp14", val:20},
    {label:"16mm (50mtr roll)", key:"fp16", val:25},
    {label:"20mm (25mtr roll)", key:"fp20", val:33},
    {label:"25mm (25mtr roll)", key:"fp25", val:34},
  ]},
  "Indo Meter Box": {type:'simple', items:[
    {label:"Single Phase", key:"mb_sp", val:325},
    {label:"Three Phase", key:"mb_tp", val:590},
  ]},
  "Drip Pipe & Hardware": {type:'simple', items:[
    {label:"Drip Pipe 16mm (200mtr) per mtr", key:"drip16", val:11},
    {label:"Drip Pipe 20mm (200mtr) per mtr", key:"drip20", val:13},
    {label:"Base Plate per KG", key:"baseplate", val:65},
    {label:"Nut Bolts All Sizes per KG", key:"nutbolt", val:95},
  ]},
};

const prices = {};
Object.values(data).forEach(sec => { if(sec.type==='simple') sec.items.forEach(i => prices[i.key] = i.val); });

// UI-only state (not part of `data`) — tracked separately so it survives re-renders.
let collapsedSections = new Set();   // section names currently collapsed
let newDeptType = 'simple';          // toggle state in the "Add Department" wizard
let newDeptName = '';                // typed name in the "Add Department" wizard

function fmt(v){
  return "₹" + (Number(v) % 1 === 0 ? Number(v).toLocaleString('en-IN') : Number(v).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}));
}

// Escapes text before it goes into innerHTML or an HTML attribute, so item/
// department names typed via the admin forms can never break the markup
// (the browser auto-decodes it back when read via dataset, so lookups by
// section name still work correctly).
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildAdmin(){
  const form = document.getElementById('admin-form');
  let html = `<div class="admin-toolbar">
    <button type="button" class="toolbar-btn" data-action="expand-all">⊞ Expand All</button>
    <button type="button" class="toolbar-btn" data-action="collapse-all">⊟ Collapse All</button>
  </div>`;

  Object.entries(data).forEach(([sec, secData]) => {
    const isCollapsed = collapsedSections.has(sec);
    const count = secData.type === 'simple' ? secData.items.length : secData.rows.length;

    html += `<div class="section-block" data-sec="${esc(sec.toLowerCase())}" data-sec-key="${esc(sec)}" data-collapsed="${isCollapsed}">`;
    html += `<div class="section-title" data-action="toggle-sec">
      <div class="section-title-left">
        <span class="section-chevron">${isCollapsed ? '▸' : '▾'}</span>
        <span class="section-name">${esc(sec)}</span>
        <span class="section-count">${count}</span>
        ${secData.type === 'custom' ? '<span class="section-type-badge">TABLE</span>' : ''}
      </div>
      <button type="button" class="del-sec-btn" data-action="del-sec" title="Delete department">🗑</button>
    </div>`;
    html += '<div class="section-body">';

    if(secData.type === 'simple'){
      secData.items.forEach(item => {
        html += `<div class="price-row" data-label="${esc(item.label.toLowerCase())}" data-key="${esc(item.key)}">
          <div class="price-label">${esc(item.label)}${item.sub ? `<small>${esc(item.sub)}</small>` : ''}</div>
          <div class="price-input"><span>₹</span><input type="number" step="0.5" value="${prices[item.key]}" data-key="${esc(item.key)}" onchange="updatePrice(this)" /></div>
          <button type="button" class="icon-btn" data-action="del-item" title="Remove item">✕</button>
        </div>`;
      });
      html += `<div class="add-item-row">
        <input type="text" class="ai-label" placeholder="New item name" />
        <input type="number" class="ai-price" step="0.5" placeholder="₹" />
        <button type="button" class="btn-add" data-action="add-item">➕ Add</button>
      </div>`;
    } else {
      html += '<div class="custom-table-wrap">';
      html += '<div class="custom-row custom-header-row">';
      secData.columns.forEach((col, ci) => {
        html += `<input type="text" class="custom-header-input" value="${esc(col)}" data-col="${ci}" onchange="handleCustomInput(this)" />`;
      });
      html += '</div>';
      secData.rows.forEach(row => {
        html += `<div class="custom-row" data-row-key="${esc(row.key)}">`;
        row.cells.forEach((cell, ci) => {
          html += `<input type="text" class="custom-cell-input" value="${esc(cell)}" data-col="${ci}" onchange="handleCustomInput(this)" />`;
        });
        html += `<div class="custom-row-actions"><button type="button" class="icon-btn" data-action="del-row" title="Remove row">✕</button></div>`;
        html += '</div>';
      });
      html += `<div class="custom-row custom-row-buttons" style="margin-top:4px">
        <button type="button" class="btn-add" data-action="add-row" style="flex:1">➕ Add Row</button>
        <button type="button" class="btn-add" data-action="add-col">➕ Column</button>
        <button type="button" class="btn-add" data-action="del-col">➖ Column</button>
      </div>`;
      html += '</div>';
    }
    html += '</div></div>';
  });

  html += renderAddDeptBlock();
  form.innerHTML = html;
  const sv = document.querySelector('.search-bar');
  if(sv && sv.value) filterRows(sv.value);
}

function renderAddDeptBlock(){
  let html = `<div class="add-dept-block">
    <div class="section-title" style="cursor:default">
      <div class="section-title-left"><span class="section-name">➕ Naya Department / Category</span></div>
    </div>
    <div class="section-body">
      <input type="text" id="new-sec-input" class="ai-label" placeholder="Department name (e.g. Junction Box)" value="${esc(newDeptName)}" oninput="newDeptName=this.value" style="width:100%;margin-bottom:8px" />
      <div class="dept-type-toggle">
        <button type="button" class="type-btn ${newDeptType==='simple'?'active':''}" data-action="set-type-simple">Simple (Item + Price)</button>
        <button type="button" class="type-btn ${newDeptType==='custom'?'active':''}" data-action="set-type-custom">Custom Table</button>
      </div>`;

  if(newDeptType === 'simple'){
    html += `<button type="button" class="btn-add" data-action="add-sec" style="width:100%">➕ Add Department</button>`;
  } else {
    html += renderGridPicker();
  }

  html += `</div></div>`;
  return html;
}

// Word "Insert Table" style grid picker: hover highlights a rows x cols
// rectangle and shows a live "R x C Table" label; clicking a cell creates
// the department immediately with that many empty rows/columns.
function renderGridPicker(){
  const COLS = 8, ROWS = 6;
  let cells = '';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      cells += `<div class="grid-cell" data-r="${r}" data-c="${c}"></div>`;
    }
  }
  return `<div class="grid-picker-wrap">
    <div class="grid-picker" id="grid-picker">${cells}</div>
    <div class="grid-picker-label" id="grid-picker-label">Table size choose karo — hover karo, click karke select karo</div>
  </div>`;
}

function handleAdminMouseover(e){
  const cell = e.target.closest('.grid-cell');
  const grid = document.getElementById('grid-picker');
  if(!cell || !grid || !grid.contains(cell)) return;
  const r = parseInt(cell.dataset.r,10), c = parseInt(cell.dataset.c,10);
  grid.querySelectorAll('.grid-cell').forEach(gc => {
    const gr = parseInt(gc.dataset.r,10), gcol = parseInt(gc.dataset.c,10);
    gc.classList.toggle('hl', gr<=r && gcol<=c);
  });
  const label = document.getElementById('grid-picker-label');
  if(label) label.textContent = (r+1) + ' x ' + (c+1) + ' Table';
}

function handleAdminClick(e){
  const gridCell = e.target.closest('.grid-cell');
  if(gridCell){
    const r = parseInt(gridCell.dataset.r,10), c = parseInt(gridCell.dataset.c,10);
    const nameInp = document.getElementById('new-sec-input');
    createCustomDept(nameInp ? nameInp.value.trim() : '', r+1, c+1);
    return;
  }

  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;

  if(action === 'add-sec'){
    const inp = document.getElementById('new-sec-input');
    addSection(inp.value.trim());
    return;
  }
  if(action === 'set-type-simple'){ newDeptType = 'simple'; buildAdmin(); return; }
  if(action === 'set-type-custom'){ newDeptType = 'custom'; buildAdmin(); return; }
  if(action === 'expand-all'){ setAllCollapsed(false); return; }
  if(action === 'collapse-all'){ setAllCollapsed(true); return; }

  const secBlock = btn.closest('.section-block');

  if(action === 'toggle-sec'){
    const sec = secBlock.dataset.secKey;
    const collapsed = secBlock.dataset.collapsed === 'true';
    secBlock.dataset.collapsed = collapsed ? 'false' : 'true';
    secBlock.querySelector('.section-chevron').textContent = collapsed ? '▾' : '▸';
    if(collapsed) collapsedSections.delete(sec); else collapsedSections.add(sec);
    return;
  }

  const sec = secBlock ? secBlock.dataset.secKey : null;
  if(!sec) return;

  if(action === 'del-sec'){
    removeSection(sec);
  } else if(action === 'del-item'){
    const row = btn.closest('.price-row');
    removeItem(sec, row.dataset.key);
  } else if(action === 'add-item'){
    const row = btn.closest('.add-item-row');
    addItem(sec, row.querySelector('.ai-label').value.trim(), row.querySelector('.ai-price').value);
  } else if(action === 'add-row'){
    addRow(sec);
  } else if(action === 'del-row'){
    const row = btn.closest('.custom-row');
    removeRow(sec, row.dataset.rowKey);
  } else if(action === 'add-col'){
    addColumn(sec);
  } else if(action === 'del-col'){
    removeColumn(sec);
  }
}

function handleCustomInput(inp){
  const secBlock = inp.closest('.section-block');
  const sec = secBlock.dataset.secKey;
  const rowEl = inp.closest('.custom-row');
  const colIdx = parseInt(inp.dataset.col, 10);
  if(rowEl.classList.contains('custom-header-row')){
    data[sec].columns[colIdx] = inp.value;
  } else {
    const row = data[sec].rows.find(r => r.key === rowEl.dataset.rowKey);
    if(row) row.cells[colIdx] = inp.value;
  }
}

function setAllCollapsed(collapsed){
  document.querySelectorAll('.section-block').forEach(blk => {
    blk.dataset.collapsed = collapsed ? 'true' : 'false';
    const chev = blk.querySelector('.section-chevron');
    if(chev) chev.textContent = collapsed ? '▸' : '▾';
    const sec = blk.dataset.secKey;
    if(collapsed) collapsedSections.add(sec); else collapsedSections.delete(sec);
  });
}

function addItem(sec, label, priceStr){
  if(!label){ alert('Item ka naam likho'); return; }
  const val = parseFloat(priceStr);
  if(isNaN(val) || val < 0){ alert('Sahi price daalo'); return; }
  const key = 'item_' + Date.now() + '_' + Math.floor(Math.random()*1000);
  data[sec].items.push({label, key, val});
  prices[key] = val;
  buildAdmin();
}

function removeItem(sec, key){
  const secData = data[sec];
  const item = secData && secData.items.find(i => i.key === key);
  if(!item) return;
  if(!confirm(`"${item.label}" delete karna hai?`)) return;
  secData.items = secData.items.filter(i => i.key !== key);
  delete prices[key];
  buildAdmin();
}

function addRow(sec){
  const secData = data[sec];
  if(!secData || secData.type !== 'custom') return;
  const cells = secData.columns.map(() => '');
  secData.rows.push({key: 'row_' + Date.now() + '_' + Math.floor(Math.random()*1000), cells});
  buildAdmin();
}

function removeRow(sec, rowKey){
  const secData = data[sec];
  if(!secData || secData.type !== 'custom') return;
  if(!confirm('Ye row delete karna hai?')) return;
  secData.rows = secData.rows.filter(r => r.key !== rowKey);
  buildAdmin();
}

function addColumn(sec){
  const secData = data[sec];
  if(!secData || secData.type !== 'custom') return;
  secData.columns.push('Column ' + (secData.columns.length + 1));
  secData.rows.forEach(r => r.cells.push(''));
  buildAdmin();
}

function removeColumn(sec){
  const secData = data[sec];
  if(!secData || secData.type !== 'custom') return;
  if(secData.columns.length <= 1){ alert('Kam se kam 1 column rakhna hoga'); return; }
  if(!confirm('Last column delete karna hai? Us column ka data sab rows se chala jayega.')) return;
  secData.columns.pop();
  secData.rows.forEach(r => r.cells.pop());
  buildAdmin();
}

function addSection(name){
  if(!name){ alert('Department ka naam daalo'); return; }
  const exists = Object.keys(data).some(k => k.toLowerCase() === name.toLowerCase());
  if(exists){ alert('Ye department already maujood hai'); return; }
  data[name] = {type:'simple', items: []};
  newDeptName = '';
  buildAdmin();
}

function createCustomDept(name, rowCount, colCount){
  if(!name){ alert('Department ka naam daalo'); return; }
  const exists = Object.keys(data).some(k => k.toLowerCase() === name.toLowerCase());
  if(exists){ alert('Ye department already maujood hai'); return; }
  const columns = [];
  for(let i=0;i<colCount;i++) columns.push('Column ' + (i+1));
  const rows = [];
  for(let i=0;i<rowCount;i++){
    rows.push({key: 'row_' + Date.now() + '_' + i + '_' + Math.floor(Math.random()*1000), cells: columns.map(()=>'')});
  }
  data[name] = {type:'custom', columns, rows};
  newDeptType = 'simple';
  newDeptName = '';
  buildAdmin();
}

function removeSection(sec){
  const secData = data[sec];
  if(!sec || !secData) return;
  if(!confirm(`Pura "${sec}" department delete karna hai, saare items ke saath?`)) return;
  if(secData.type === 'simple') secData.items.forEach(i => delete prices[i.key]);
  delete data[sec];
  collapsedSections.delete(sec);
  buildAdmin();
}

function updatePrice(inp){
  prices[inp.dataset.key] = parseFloat(inp.value)||0;
}

function filterRows(q){
  q = q.toLowerCase();
  document.querySelectorAll('.section-block').forEach(blk => {
    const secNameMatch = !q || (blk.dataset.sec && blk.dataset.sec.includes(q));
    const priceRows = blk.querySelectorAll('.price-row');
    let visible = 0;
    if(priceRows.length){
      priceRows.forEach(row => {
        const match = !q || row.dataset.label.includes(q) || secNameMatch;
        row.style.display = match ? '' : 'none';
        if(match) visible++;
      });
    } else {
      visible = secNameMatch ? 1 : 0;
    }
    blk.style.display = (!q || visible > 0) ? '' : 'none';
  });
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='admin')||(i===1&&t==='preview')));
  document.getElementById('admin-panel').classList.toggle('active', t==='admin');
  document.getElementById('preview-panel').classList.toggle('active', t==='preview');
  if(t==='preview') renderPDF();
}

function pVal(key){ return fmt(prices[key]); }

// Renders every department currently in `data` — simple Item/Price tables
// and custom N-column tables alike — so Preview/PDF always stays in sync
// automatically with whatever the Admin tab currently holds.

  const out = document.getElementById('pdf-output');

  const simpleRows = (items) => items.map(i => `<tr><td>${esc(i.label)}${i.sub?`<br><span style="color:#888;font-size:9px">${esc(i.sub)}</span>`:''}</td><td class="price-cell">${pVal(i.key)}</td></tr>`).join('');
  const simpleSection = (title, items, headers) =>
    `<div class="pdf-section"><div class="pdf-section-title">${esc(title)}</div>
    <table class="pdf-table"><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${simpleRows(items)}</tbody></table></div>`;

    const headHtml = columns.map(h=>`<th>${esc(h)}</th>`).join('');
    const bodyHtml = rows.map(r => `<tr>${r.cells.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('');
